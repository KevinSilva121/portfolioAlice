<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2D76E" />
      <stop offset="40%" stop-color="#D4AF37" />
      <stop offset="60%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="softGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Elemento Totalmente Transparente de Fundo -->
  <rect width="100" height="100" fill="transparent" />
  
  <!-- Letras Grandes AC Ocupando a Maior Parte do Espaço -->
  <g transform="translate(15, 12) scale(1.15)" filter="url(#softGlow)" fill="none" stroke="url(#gradMetallic)" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Letra A Monumental -->
    <path d="M 30 65 L 15 5 L 45 5 L 60 65" stroke-width="10" />
    <path d="M 22 40 L 52 40" stroke-width="10" />
    
    <!-- Letra C Cruzando o A com curvas acentuadas e tamanho equivalente -->
    <path d="M 65 15 C 45 -5, -5 -5, -5 35 C -5 75, 45 75, 65 55" stroke-width="12" />
    
  </g>
</svg>