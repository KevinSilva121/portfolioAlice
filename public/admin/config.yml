backend:
  name: git-gateway
  branch: main

media_folder: "public/media"
public_folder: "/media"
site_url: "https://willowy-pothos-7ab5a0.netlify.app"
logo_url: "/favicon.svg"

collections:
  - name: "blog"
    label: "Artigos do Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Resumo", name: "excerpt", widget: "text", hint: "Texto curto que aparece na listagem dos posts"}
      - {label: "Imagem de Capa (opcional)", name: "thumbnail", widget: "image", required: false}
      - {label: "Conteúdo", name: "body", widget: "markdown"}
